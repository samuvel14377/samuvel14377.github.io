<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam Tech Agent</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<nav>
<div class="logo">Sam<span>Tech</span></div>

<ul>
<li>Home</li>
<li>Features</li>
<li id="pricingBtn">Pricing</li>
</ul>

<button id="loginBtn" class="btn3d">Login</button>
</nav>

<section class="hero">

<h1>Sam Tech Agent</h1>
<p>AI tools • Automation • Future Tech</p>

<div class="prompt-box">
<input id="promptInput" placeholder="Type prompt...">
<button id="generateBtn" class="btn3d">Generate</button>
</div>

<p id="result"></p>

</section>

<section class="cards">

<div class="card">
<h3>AI Prompt Tool</h3>
<p>Create viral prompts instantly</p>
<button class="btn3d">Open</button>
</div>

<div class="card">
<h3>AI Image Tool</h3>
<p>Generate powerful visuals</p>
<button class="btn3d">Open</button>
</div>

<div class="card">
<h3>Automation</h3>
<p>Boost productivity with AI</p>
<button class="btn3d">Open</button>
</div>

</section>

<!-- LOGIN MODAL -->

<div id="loginModal" class="modal">

<div class="modal-content">

<h2>Sign in</h2>

<input placeholder="Email">
<input placeholder="Password" type="password">

<button class="btn3d">Login</button>

</div>

</div>

<script src="script.js"></script>

</body>
  </html>
